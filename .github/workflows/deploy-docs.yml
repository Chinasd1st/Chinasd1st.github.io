name: 部署文档

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4          # 先安装 pnpm，让 PATH 里有 pnpm 可执行文件
        with:
          version: 10                       # 或去掉这一行，用 package.json 中的 "packageManager": "pnpm@10.x.x"

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v6
        with:
          node-version: 22                  # 或 24
          cache: 'pnpm'                     # 现在 pnpm 已存在，可以安全使用缓存

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建文档
        env:
          NODE_OPTIONS: --max_old_space_size=8192
          PASSWORD: ${{ secrets.PASSWORD }}
          ALGOLIA_APP_ID: ${{ vars.ALGOLIA_APP_ID }}
          ALGOLIA_API_KEY: ${{ vars.ALGOLIA_API_KEY }}
          ALGOLIA_INDEX_NAME: ${{ vars.ALGOLIA_INDEX_NAME }}
        run: |-
          pnpm docs:build
          touch src/.vuepress/dist/.nojekyll

      - name: 部署到 GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: src/.vuepress/dist