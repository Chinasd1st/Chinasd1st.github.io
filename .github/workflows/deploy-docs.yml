name: 部署文档
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'  # 这会自动缓存 ~/.npm，根据 package-lock.json hash 键

      - name: 安装依赖
        run: |
          corepack enable
          npm ci --legacy-peer-deps  # 保持你的 --legacy-peer-deps，如果有 peer 冲突

      - name: 构建文档
        env:
          NODE_OPTIONS: --max_old_space_size=8192
          PASSWORD: ${{ secrets.PASSWORD }}
          ALGOLIA_APP_ID: ${{ vars.ALGOLIA_APP_ID }}
          ALGOLIA_API_KEY: ${{ vars.ALGOLIA_API_KEY }}
          ALGOLIA_INDEX_NAME: ${{ vars.ALGOLIA_INDEX_NAME }}
        run: |-
          npm run docs:build
          touch src/.vuepress/dist/.nojekyll  # 用 touch 更标准（创建空文件）

      - name: 部署文档
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: src/.vuepress/dist